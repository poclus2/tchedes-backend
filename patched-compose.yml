version: '3.8'

services:
  tchedes-api:
    build: .
    container_name: tchedes-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=https://app-tchedes.dartsia.app
      - PORT=3000
      - DATABASE_URL=postgresql://tchedes_user:tchedes_secure_pass_2026@tchedes-db:5432/tchedes_db?schema=public
      - REDIS_URL=redis://tchedes-redis:6379
      - REDIS_HOST=tchedes-redis
      - JWT_SECRET=${JWT_SECRET:-tchedes_super_secret_jwt_key_prod}
      - CORS_ORIGIN=https://tchedes.dartsia.app,https://app-tchedes.dartsia.app,https://dashboard.dartsia.app
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-credentials.json # Make sure to mount or copy this file
    depends_on:
      - tchedes-db
      - tchedes-redis
    volumes:
      - ./gcp-key.json:/app/gcp-credentials.json:ro # Mount GCP key read-only (Must be present on host)
      - uploads_data:/app/uploads

  tchedes-worker:
    build: .
    container_name: tchedes-worker
    restart: always
    command: npm run worker
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=https://app-tchedes.dartsia.app
      - DATABASE_URL=postgresql://tchedes_user:tchedes_secure_pass_2026@tchedes-db:5432/tchedes_db?schema=public
      - REDIS_URL=redis://tchedes-redis:6379
      - REDIS_HOST=tchedes-redis
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
      - OCR_SERVICE_URL=http://python-ocr:8000
    depends_on:
      - tchedes-db
      - tchedes-redis
      - python-ocr
    volumes:
      - ./gcp-key.json:/app/gcp-key.json:ro
      - uploads_data:/app/uploads

  tchedes-db:
    image: postgres:16-alpine
    container_name: tchedes-db
    restart: always
    environment:
      - POSTGRES_USER=tchedes_user
      - POSTGRES_PASSWORD=tchedes_secure_pass_2026
      - POSTGRES_DB=tchedes_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  tchedes-redis:
    image: redis:7-alpine
    container_name: tchedes-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  python-ocr:
    build: ./python-ocr
    container_name: python-ocr
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
  redisdata:
  uploads_data: