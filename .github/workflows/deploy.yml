name: Deploy Backend to Contabo (GHCR)

on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /opt/tchedes-backend
            
            # Create a simple docker-compose.yml for production on the host
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              tchedes-api:
                image: ghcr.io/${{ env.IMAGE_NAME }}:main
                container_name: tchedes-api
                restart: always
                ports:
                  - "3015:3000"
                environment:
                  - NODE_ENV=production
                  - FRONTEND_URL=https://app-tchedes.dartsia.app
                  - PORT=3000
                  - DATABASE_URL=postgresql://tchedes_user:tchedes_secure_pass_2026@tchedes-db:5432/tchedes_db?schema=public
                  - REDIS_URL=redis://tchedes-redis:6379
                  - REDIS_HOST=tchedes-redis
                  - JWT_SECRET=\${JWT_SECRET:-tchedes_super_secret_jwt_key_prod}
                  - CORS_ORIGIN=https://tchedes.dartsia.app,https://app-tchedes.dartsia.app,https://dashboard.dartsia.app
                depends_on:
                  - tchedes-db
                  - tchedes-redis
                volumes:
                  - uploads_data:/app/uploads

              tchedes-worker:
                image: ghcr.io/${{ env.IMAGE_NAME }}:main
                container_name: tchedes-worker
                restart: always
                command: npm run worker
                environment:
                  - NODE_ENV=production
                  - FRONTEND_URL=https://app-tchedes.dartsia.app
                  - DATABASE_URL=postgresql://tchedes_user:tchedes_secure_pass_2026@tchedes-db:5432/tchedes_db?schema=public
                  - REDIS_URL=redis://tchedes-redis:6379
                  - REDIS_HOST=tchedes-redis
                depends_on:
                  - tchedes-db
                  - tchedes-redis
                volumes:
                  - uploads_data:/app/uploads

              tchedes-db:
                image: postgres:16-alpine
                container_name: tchedes-db
                restart: always
                environment:
                  - POSTGRES_USER=tchedes_user
                  - POSTGRES_PASSWORD=tchedes_secure_pass_2026
                  - POSTGRES_DB=tchedes_db
                volumes:
                  - pgdata:/var/lib/postgresql/data

              tchedes-redis:
                image: redis:7-alpine
                container_name: tchedes-redis
                restart: always
                volumes:
                  - redisdata:/data

            volumes:
              pgdata:
              redisdata:
              uploads_data:
            EOF
            
            docker compose pull
            docker compose down || true
            docker compose up -d
            echo "Successfully deployed ${{ env.IMAGE_NAME }} to Contabo! 🚀"
